apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configurations:
- https://argoproj.github.io/argo-rollouts/features/kustomize/rollout-transform.yaml

openapi:
  path: https://raw.githubusercontent.com/argoproj/argo-schema-generator/main/schema/argo_all_k8s_kustomize_schema.json

resources:
- github.com/upen28/order-service/k8s?ref=main

namespace: production

patches:
- patch: "apiVersion: argoproj.io/v1alpha1\nkind: Rollout\nmetadata:\n name: order-service-rollout\nspec:\n
    \ template:\n    spec:\n      containers:\n        - name: order-service-container\n
    \         env:\n            - name: SPRING_PROFILES_ACTIVE\n              value:
    production\n            - name: JAVA_TOOL_OPTIONS\n              value: -javaagent:/workspace/BOOT-INF/lib/opentelemetry-javaagent-2.6.0.jar\n
    \           - name: OTEL_SERVICE_NAME\n              value: edge-service           \n
    \           - name: OTEL_EXPORTER_OTLP_ENDPOINT\n              value: http://tempo.monitoring.svc.cluster.local:4318\n
    \           - name: OTEL_METRICS_EXPORTER\n              value: none       "
- patch: |-
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    metadata:
     name: order-service-rollout
    spec:
      replicas: 1
images:
- name: order-service
  newName: ghcr.io/upen28/order-service
  newTag: 6360f4c6354d46bd48bfcec1605a99cf0d14304c
